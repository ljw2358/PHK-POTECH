<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK | GLOBAL CORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* HK 시그니처 컬러 테마 */
        :root {
            --gold: #FFD700; --pi-orange: #FF8C00; --neon-green: #00FF7F; --cs-red: #FF4500;
            --bg-dark: #000000; --card-bg: #0d0d0d; --border-gray: #333;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--bg-dark); color: #ffffff; 
            font-family: 'Apple SD Gothic Neo', 'Pretendard', sans-serif; 
            margin: 0; padding: 0; line-height: 1.5; 
        }
        .app-container { width: 100%; max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; }

        /* 상단 언어 선택 및 노드 정보 */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px; }
        .node-tag { color: var(--neon-green); font-size: 10px; font-weight: 800; letter-spacing: 1px; }

        /* 메인 헤더 & 자산 카드 */
        .header { text-align: center; padding: 20px 0; }
        .brand-logo { font-size: 40px; font-weight: 900; color: var(--gold); line-height: 1.1; margin-bottom: 10px; }
        .main-card { 
            background: linear-gradient(145deg, #1a1a1a, #000); border: 1px solid var(--border-gray);
            border-radius: 25px; margin: 0 20px; padding: 30px 20px; text-align: center; position: relative;
        }
        .apr-badge { position: absolute; top: 15px; right: 20px; color: var(--neon-green); font-weight: bold; font-size: 14px; }
        .asset-title { color: var(--gold); font-size: 16px; margin-bottom: 15px; font-weight: 700; }
        .balance { font-size: 48px; font-weight: 900; margin-bottom: 20px; }
        .gcv-label { 
            display: inline-block; border: 2px solid var(--neon-green); border-radius: 50px;
            padding: 10px 25px; color: var(--neon-green); font-weight: 800; font-size: 16px;
        }

        /* 6대 핵심 서비스 그리드 */
        .service-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 30px 20px; }
        .service-item { text-align: center; text-decoration: none; color: #fff; }
        .icon-wrap { 
            width: 70px; height: 70px; background: #1a1a1a; border-radius: 20px; 
            margin: 0 auto 10px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .icon-wrap i { font-size: 28px; }
        .service-label { font-size: 13px; font-weight: 700; color: #aaa; }

        /* [핵심복구] 사진 속 누락된 버튼 섹션 */
        .liquidity-status { padding: 0 25px; margin-bottom: 20px; border-left: 4px solid var(--gold); }
        .status-text { font-size: 14px; color: #eee; font-weight: 800; margin-bottom: 5px; }
        
        .action-group { display: flex; gap: 10px; padding: 10px 20px; margin-bottom: 20px; }
        .btn-action { 
            flex: 1; height: 65px; border-radius: 15px; border: none; font-size: 16px; font-weight: 900; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
        }
        .btn-pi { background: #111; border: 2px solid var(--gold); color: #fff; }
        .btn-swap { background: var(--pi-orange); color: #fff; }
        .btn-lp { background: var(--neon-green); color: #000; }

        /* 고객지원센터 & 하단 정보 */
        .cs-center { padding: 0 20px 25px 20px; }
        .btn-cs { 
            width: 100%; height: 70px; background: var(--cs-red); border-radius: 20px; border: none;
            color: #fff; font-size: 18px; font-weight: 950; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .contact-info { text-align: center; color: #fff; font-weight: 800; font-size: 15px; margin-bottom: 25px; }
        
        .social-links { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; margin-bottom: 40px; }
        .social-card { 
            background: #111; padding: 20px; border-radius: 20px; border: 1px solid #222; text-align: center; text-decoration: none; color: #fff;
        }
        .social-card i { font-size: 30px; margin-bottom: 8px; display: block; }

        .footer { text-align: center; font-size: 11px; color: #444; padding-bottom: 40px; line-height: 1.6; font-weight: 800; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-bar">

        <div style="border: 1px solid var(--gold); color: var(--gold); padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold;">KR (한국어)</div>

    <div class="service-grid">

        <a href="#" class="service-item"><div class="icon-wrap"><i class="fa-solid fa-utensils" style="color:#fff"></i></div><div class="service-label">예치</div></a>
        <a href="#" class="service-item"><div class="icon-wrap"><i class="fa-solid fa-gift" style="color:var(--gold)"></i></div><div class="service-label">보상</div></a>
        <a href="#" class="service-item"><div class="icon-wrap"><i class="fa-solid fa-scale-balanced" style="color:#ADFF2F"></i></div><div class="service-label">소득</div></a>
        <a href="#" class="service-item"><div class="icon-wrap"><i class="fa-solid fa-arrows-rotate" style="color:#BA55D3"></i></div><div class="service-label">스왑</div></a>

    <div class="liquidity-status">
        <div class="status-text" style="color: var(--gold);">STAKING APR 31.4%</div>
        <div class="status-text">유동성 풀 $</div>
        <div class="status-text" style="font-size: 20px;">88,401,773,756</div>
        <div class="status-text" style="color: #00CCFF;">HK_퀀텀_쉴드_활성</div>
    </div>

    <div class="action-group">
        <button class="btn-action btn-pi">Pi 수량</button>
        <button class="btn-action btn-swap">SWAP</button>
        <button class="btn-action btn-lp">LP 공급</button>
    </div>

    <div class="cs-center">
        <button class="btn-cs"><i class="fa-solid fa-headset"></i> 24/7 글로벌 고객지원센터</button>
    </div>

    <div class="contact-info">
        <i class="fa-solid fa-envelope" style="margin-right: 8px;"></i> info@hkwb.co.kr
    </div>

    <div class="social-links">
        <a href="https://www.youtube.com/@hyekong2025" target="_blank" class="social-card">
            <i class="fa-brands fa-youtube" style="color: #FF0000;"></i>
            <span style="font-weight: 800;">YouTube</span>
        </a>
        <a href="https://www.tiktok.com/@hyekong2025" target="_blank" class="social-card">
            <i class="fa-brands fa-tiktok"></i>
            <span style="font-weight: 800;">TikTok</span>
        </a>
    </div>

    <footer class="footer">
        © 2026 HK GROUP GLOBAL HEGEMONY.<br>
        CHAIRMAN LEE JAEWAN. ALL RIGHTS RESERVED.
    </footer>
</div>

</body>
</html>
