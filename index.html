
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --hk-gold: #FFD700; --hk-dark: #000; --hk-green: #00FF00; --hk-blue: #007AFF; }
        /* 단어 단위 정렬 (Pi Browser 최적화) */
        * { box-sizing: border-box; margin: 0; padding: 0; word-break: keep-all; } 
        body { background-color: var(--hk-dark); color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 480px; padding: 20px; }

        /* 언어 선택기 */
        .top-nav { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .lang-select { background: #111; color: var(--hk-gold); border: 1px solid var(--hk-gold); padding: 5px 10px; border-radius: 6px; font-size: 13px; font-weight: bold; }

        .brand { font-size: 32px; font-weight: 900; color: var(--hk-gold); margin: 20px 0; letter-spacing: -1px; }

        /* 자산 대시보드 */
        .asset-card { background: linear-gradient(180deg, #1a1a1a, #000); border-radius: 25px; padding: 40px 15px; text-align: center; border: 1px solid #333; margin-bottom: 25px; }
        .asset-val { font-size: 50px; font-weight: 900; margin: 10px 0; }
        .gcv-badge { display: inline-block; padding: 8px 20px; border-radius: 50px; border: 1.5px solid var(--hk-green); color: var(--hk-green); font-size: 15px; font-weight: bold; }

        /* 6구 메뉴 */
        .grid-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .grid-box { background: #111; padding: 25px 5px; border-radius: 15px; text-align: center; border: 1px solid #222; cursor: pointer; transition: 0.2s; }
        .grid-box:active { transform: scale(0.95); background: #222; }
        .grid-box i { font-size: 30px; margin-bottom: 10px; display: block; }
        .grid-box span { font-size: 15px; font-weight: bold; }

        /* 스테이킹 정보 */
        .stake-info { background: #0a0a0a; border-left: 5px solid var(--hk-gold); padding: 20px; margin-bottom: 25px; border-radius: 0 15px 15px 0; }
        .stake-num { font-size: 26px; font-weight: 900; }

        /* 버튼 3개 (SNS 바로 위) */
        .action-btns { display: flex; gap: 10px; margin-bottom: 15px; }
        .act-btn { flex: 1; padding: 18px 5px; border-radius: 12px; border: none; font-weight: 900; font-size: 15px; }
        .white { background: #fff; color: #000; }
        .gold { background: var(--hk-gold); color: #000; }
        .green { background: #00c853; color: #fff; }

        /* 고객센터 및 SNS */
        .cs-wide { width: 100%; padding: 18px; background: #ff4444; color: #fff; border: none; border-radius: 12px; font-weight: 900; font-size: 16px; margin-bottom: 15px; }
        .sns-group { display: flex; gap: 10px; margin-bottom: 40px; }
        .sns-link { flex: 1; padding: 15px; border-radius: 12px; text-decoration: none; color: #fff; text-align: center; font-weight: 900; }

        /* 푸터 - 예치 APY */
        footer { text-align: center; border-top: 1px solid #222; padding-top: 40px; }
        .apy-footer { color: var(--hk-gold); font-size: 38px; font-weight: 900; margin-bottom: 25px; }
        .policy-txt { color: #555; text-decoration: none; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-nav">
        <select class="lang-select" id="langIdx" onchange="updateLang()">
            <option value="ko">한국어 🇰🇷</option><option value="en">English 🇺🇸</option>
            <option value="zh">中文 🇨🇳</option><option value="ar">العربية 🇸🇦</option>
            <option value="hi">हिन्दी 🇮🇳</option><option value="es">Español 🇪🇸</option>
            <option value="pt">Português 🇧🇷</option><option value="uk">Українська 🇺🇦</option>
            <option value="ja">日本語 🇯🇵</option><option value="ru">Русский 🇷🇺</option>
            <option value="vi">Tiếng Việt 🇻🇳</option><option value="th">ไทย 🇹🇭</option>
            <option value="de">Deutsch 🇩🇪</option><option value="fr">Français 🇫🇷</option>
            <option value="it">Italiano 🇮🇹</option>
        </select>
    </div>

    <div class="brand">HK WORLD BANK</div>

    <div class="asset-card">
        <div id="t-ledger" style="color:var(--hk-gold); font-weight:bold; margin-bottom:10px;">메인 자산 통합 원장</div>
        <div class="asset-val">400.0212 <span style="color:var(--hk-gold); font-size:0.5em;">Pi</span></div>
        <div class="gcv-badge" id="t-gcv">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="grid-6">
        <div class="grid-box"><i class="fas fa-paper-plane" style="color:var(--hk-blue)"></i><span data-k="send">송금</span></div>
        <div class="grid-box" onclick="alert('결제 테스트 1/10 시작')"><i class="fas fa-shopping-cart" style="color:#FF9500"></i><span data-k="pay">결제</span></div>
        <div class="grid-box"><i class="fas fa-piggy-bank" style="color:var(--hk-gold)"></i><span data-k="save">예치</span></div>
        <div class="grid-box"><i class="fas fa-gift" style="color:#FF3B30"></i><span data-k="reward">보상</span></div>
        <div class="grid-box"><i class="fas fa-balance-scale" style="color:#AF52DE"></i><span data-k="ubi">기본소득</span></div>
        <div class="grid-box"><i class="fas fa-rotate" style="color:var(--hk-cyan)"></i><span data-k="swap2">스왑</span></div>
    </div>

    <div class="stake-info">
        <div style="color:var(--hk-gold); font-size:13px; font-weight:bold; margin-bottom:5px;" id="t-stk">STAKING 31.4% | 유동성 풀 $</div>
        <div class="stake-num">88,401,819,601</div>
    </div>

    <div class="action-btns">
        <button class="act-btn white" id="b-pi">PI 수량</button>
        <button class="act-btn gold" id="b-swap">SWAP</button>
        <button class="act-btn green" id="b-lp">LP 공급</button>
    </div>

    <button class="cs-wide" id="t-cs">글로벌 고객지원센터</button>

    <div class="sns-group">
        <a href="#" class="sns-link" style="background:#f00;">YOUTUBE</a>
        <a href="#" class="sns-link" style="background:#000; border:1px solid #333;">TIKTOK</a>
    </div>

    <footer>
        <div class="apy-footer" id="t-apy">예치 (APY 31.4%)</div>
        <div style="color:#888; font-size:15px; font-weight:bold; line-height:1.6; margin-bottom:25px;" id="t-msg">"HK WorldBank는 고객님의 자산을 양자 암호 기술로 안전하게 보호합니다."</div>
        <a href="#" class="policy-txt" id="t-policy">개인정보처리방안</a>
    </footer>
</div>

        uk: { ledger:"Реєстр активів", gcv:"Оцінка: $ 125,663,600 (GCV)", send:"Надіслати", pay:"Оплата", save:"Депозит", reward:"Нагорода", ubi:"Дохід", swap2:"Обмін", pi:"К-сть PI", swap:"SWAP", lp:"LP Постачання", cs:"Центр підтримки", apy:"Депозит (APY 31.4%)", msg:'"HK WorldBank захищає активи квантовим шифруванням."', policy:"Політика", stk:"Стейкінг 31.4% | LP $" },

    function updateLang() {
        const lang = document.getElementById('langIdx').value;
        const d = i18n[lang] || i18n['en'];
        document.getElementById('t-ledger').innerText = d.ledger;
        document.getElementById('t-gcv').innerText = d.gcv;
        document.getElementById('b-pi').innerText = d.pi;
        document.getElementById('b-swap').innerText = d.swap;
        document.getElementById('b-lp').innerText = d.lp;
        document.getElementById('t-cs').innerText = d.cs;
        document.getElementById('t-stk').innerText = d.stk;
        document.getElementById('t-apy').innerText = d.apy;
        document.getElementById('t-msg').innerText = d.msg;
        document.getElementById('t-policy').innerText = d.policy;
        document.querySelectorAll('[data-k]').forEach(el => el.innerText = d[el.getAttribute('data-k')]);
    }
</script>
</body>
</html>
