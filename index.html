<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK - Payment Test</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --hk-gold: #FFD700; --hk-dark: #000; --hk-green: #00FF00; --hk-cyan: #00F2FF; }
        /* 단어 정렬 최적화 */
        * { box-sizing: border-box; margin: 0; padding: 0; word-break: keep-all; }
        body { background-color: var(--hk-dark); color: white; font-family: sans-serif; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 480px; padding: 15px; }

        /* 상단 언어 선택 (우측 상단) */
        .top-nav { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .lang-select { background: #111; color: var(--hk-gold); border: 1px solid var(--hk-gold); padding: 6px; border-radius: 5px; font-size: 13px; font-weight: bold; cursor: pointer; }

        .brand { font-size: 30px; font-weight: 900; color: var(--hk-gold); margin: 20px 0; letter-spacing: -1px; }

        /* 자산 대시보드 */
        .asset-card { background: linear-gradient(180deg, #111, #000); border-radius: 25px; padding: 45px 10px; text-align: center; border: 1px solid #333; margin-bottom: 20px; }
        .asset-val { font-size: 48px; font-weight: 900; margin: 10px 0; }
        .gcv-badge { display: inline-block; padding: 8px 20px; border-radius: 20px; border: 1px solid var(--hk-green); color: var(--hk-green); font-size: 15px; font-weight: bold; }

        /* 6구 메뉴 그리드 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .menu-box { background: #111; padding: 25px 5px; border-radius: 15px; text-align: center; border: 1px solid #222; transition: 0.2s; }
        .menu-box:active { transform: scale(0.95); background: #222; }
        .menu-box i { font-size: 28px; margin-bottom: 12px; display: block; }
        .menu-box span { font-size: 15px; font-weight: bold; display: block; }

        /* 스테이킹 정보 */
        .stake-bar { background: #0a0a0a; border-left: 5px solid var(--hk-gold); padding: 20px; margin-bottom: 25px; border-radius: 0 12px 12px 0; }
        .stake-num { font-size: 28px; font-weight: 900; }

        /* 3대 액션 버튼 (SNS 위 배치) */
        .action-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .act-btn { flex: 1; padding: 18px 5px; border-radius: 12px; border: none; font-weight: 900; font-size: 15px; cursor: pointer; }
        .b-white { background: #fff; color: #000; }
        .b-gold { background: var(--hk-gold); color: #000; }
        .b-green { background: #00c853; color: #fff; }

        /* 고객지원 및 소셜 */
        .cs-btn { width: 100%; padding: 18px; background: #ff4444; color: #fff; border: none; border-radius: 12px; font-weight: 900; font-size: 16px; margin-bottom: 15px; cursor: pointer; }
        .sns-row { display: flex; gap: 10px; margin-bottom: 40px; }
        .sns-btn { flex: 1; padding: 15px; border-radius: 12px; text-decoration: none; color: #fff; text-align: center; font-weight: 900; font-size: 15px; }

        /* 푸터 - 예치 및 정책 */
        footer { text-align: center; border-top: 1px solid #222; padding-top: 40px; }
        .apy-main { color: var(--hk-gold); font-size: 40px; font-weight: 900; margin-bottom: 25px; }
        .sec-msg { color: #888; font-size: 16px; font-weight: bold; line-height: 1.6; margin-bottom: 30px; padding: 0 10px; }
        .policy-link { color: #444; text-decoration: none; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-nav">
        <select class="lang-select" id="langSel" onchange="changeLang()">
            <option value="ko">한국어 🇰🇷</option><option value="en">English 🇺🇸</option>
            <option value="zh">中文 🇨🇳</option><option value="ar">العربية 🇸🇦</option>
            <option value="hi">हिन्दी 🇮🇳</option><option value="es">Español 🇪🇸</option>
            <option value="pt">Português 🇧🇷</option><option value="uk">Українська 🇺🇦</option>
            <option value="ja">日本語 🇯🇵</option><option value="ru">Русский 🇷🇺</option>
            <option value="vi">Tiếng Việt 🇻🇳</option><option value="th">ไทย 🇹🇭</option>
            <option value="de">Deutsch DE</option><option value="fr">Français 🇫🇷</option>
            <option value="it">Italiano 🇮🇹</option>
        </select>
    </div>

    <div class="brand">HK WORLD BANK</div>

    <div class="asset-card">
        <div id="l-ledger" style="color:var(--hk-gold); font-weight:bold;">메인 자산 통합 원장</div>
        <div class="asset-val">400.0212 <span style="color:var(--hk-gold); font-size:0.5em;">Pi</span></div>
        <div class="gcv-badge" id="l-gcv">가치 평가: $ 125,663,600 (GCV)</div>
    </div>

    <div class="menu-grid">
        <div class="menu-box"><i class="fas fa-paper-plane" style="color:#007AFF"></i><span data-k="send">송금</span></div>
        <div class="menu-box" onclick="alert('결제 시스템 테스트 시작')"><i class="fas fa-shopping-cart" style="color:#FF9500"></i><span data-k="pay">결제</span></div>
        <div class="menu-box"><i class="fas fa-piggy-bank" style="color:var(--hk-gold)"></i><span data-k="save">예치</span></div>
        <div class="menu-box"><i class="fas fa-gift" style="color:#FF3B30"></i><span data-k="reward">보상</span></div>
        <div class="menu-box"><i class="fas fa-balance-scale" style="color:#AF52DE"></i><span data-k="ubi">기본소득</span></div>
        <div class="menu-box"><i class="fas fa-rotate" style="color:var(--hk-cyan)"></i><span data-k="swap2">스왑</span></div>
    </div>

    <div class="stake-bar">
        <div style="color:var(--hk-gold); font-size:13px; font-weight:bold;" id="l-stk">STAKING 31.4% | 유동성 풀 $</div>
        <div class="stake-num">88,401,819,601</div>
    </div>

    <div class="action-row">
        <button class="act-btn b-white" id="b-pi">PI 수량</button>
        <button class="act-btn b-gold" id="b-swap">SWAP</button>
        <button class="act-btn b-green" id="b-lp">LP 공급</button>
    </div>

    <button class="cs-btn" id="l-cs">글로벌 고객지원센터</button>

    <div class="sns-row">
        <a href="#" class="sns-btn" style="background:#f00;">YOUTUBE</a>
        <a href="#" class="sns-btn" style="background:#000; border:1px solid #333;">TIKTOK</a>
    </div>

    <footer>
        <div class="apy-main" id="l-apy">예치 (APY 31.4%)</div>
        <div class="sec-msg" id="l-msg">"HK WorldBank는 고객님의 자산을 양자 암호 기술로 안전하게 보호합니다."</div>
        <a href="#" class="policy-link" id="l-policy">개인정보처리방안</a>
    </footer>
</div>

    function changeLang() {
        const lang = document.getElementById('langSel').value;
        const d = i18n[lang];
        document.getElementById('l-ledger').innerText = d.ledger;
        document.getElementById('l-gcv').innerText = d.gcv;
        document.getElementById('b-pi').innerText = d.pi;
        document.getElementById('b-swap').innerText = d.swap;
        document.getElementById('b-lp').innerText = d.lp;
        document.getElementById('l-cs').innerText = d.cs;
        document.getElementById('l-stk').innerText = d.stk;
        document.getElementById('l-apy').innerText = d.apy;
        document.getElementById('l-msg').innerText = d.msg;
        document.getElementById('l-policy').innerText = d.policy;
        document.querySelectorAll('[data-k]').forEach(el => el.innerText = d[el.getAttribute('data-k')]);
    }
</script>
</body>
</html>
