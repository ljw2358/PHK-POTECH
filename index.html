<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK GROUP | CHAIRMAN HYEKONG | LIVE TEST TERMINAL</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --gold: #D4AF37; --bg: #000; --neon: #00F2FF; }
        body { background: var(--bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* 국기 커맨드 센터 */
        .flag-shrine { 
            display: flex; justify-content: center; gap: 15px; padding: 20px; 
            background: rgba(5, 5, 5, 0.95); border-bottom: 5px solid var(--gold); 
            position: sticky; top: 0; z-index: 10000; overflow-x: auto;
        }
        .flag-btn { cursor: pointer; transition: 0.3s; filter: brightness(0.4); flex-shrink: 0; }
        .flag-btn:hover { transform: scale(1.3); filter: brightness(1); }
        .flag-btn img { width: 50px; height: 35px; border-radius: 5px; border: 1px solid #333; }

        /* 메인 결제 터미널 */
        .terminal-master { 
            max-width: 900px; margin: 50px auto; padding: 60px 20px; 
            background: #010101; border: 10px solid var(--gold); border-radius: 50px;
            text-align: center; box-shadow: 0 0 100px rgba(212,175,55,0.5);
        }
        .node-info { font-size: 1.2rem; color: var(--neon); margin-bottom: 10px; font-weight: bold; }
        .pi-mega-display { font-size: 5rem; color: var(--neon); font-weight: 900; margin: 30px 0; letter-spacing: 5px; text-shadow: 0 0 20px var(--neon); }
        
        .btn-hk-pay { 
            width: 100%; max-width: 550px; padding: 35px; background: var(--gold); color: #000; 
            font-size: 2.2rem; font-weight: 900; border: none; cursor: pointer; border-radius: 20px;
            transition: 0.2s; text-transform: uppercase; box-shadow: 0 10px 0 #8b6d00;
        }
        .btn-hk-pay:active { transform: translateY(6px); box-shadow: 0 4px 0 #8b6d00; }
        .btn-hk-pay:disabled { background: #555; box-shadow: none; cursor: not-allowed; }

        /* 실시간 시스템 로그 */
        .audit-vault { 
            max-width: 900px; margin: 30px auto; padding: 25px; background: #080808; 
            border: 1px solid #333; font-family: 'Courier New', monospace; font-size: 0.95rem; color: #00ff41;
            height: 350px; overflow-y: scroll; text-align: left; line-height: 1.6;
            box-shadow: inset 0 0 20px #000;
        }
    </style>
</head>
<body>

<div class="flag-shrine" id="flag-list"></div>

<div class="terminal-master">
    <h1 style="font-size:3.5rem; color:var(--gold); margin:0;">HK-WorldBank</h1>
    <p style="color:var(--gold); letter-spacing:8px; font-size:0.9rem;">SOVEREIGN ASSET SETTLEMENT</p>
    
    <div id="node-status" class="node-info">[SYSTEM STATUS: STANDBY]</div>
    
    <div class="pi-mega-display" id="pi-display">1.00 Test-Pi</div>
    
    <button class="btn-hk-pay" id="pay-button" onclick="launchPayment()">INITIALIZE SETTLEMENT</button>
    <p style="margin-top:20px; color:#666;">※ Pi Browser 전용 테스트 모드</p>
</div>

<div class="audit-vault" id="log-box">
    [SYSTEM] HK-WorldBank V5.0 LIVE TEST CORE LOADED...<br>
    [SECURITY] CHAIRMAN HYEKONG LEVEL 7 AUTH REQUIRED.<br>
</div>

<script>
    // 1. Pi SDK 초기화 (테스트용 sandbox 모드)
    Pi.init({ version: "2.0", sandbox: true });

    const logBox = document.getElementById('log-box');
    const payBtn = document.getElementById('pay-button');

    function addLog(msg, type = 'INFO') {
        const time = new Date().toLocaleTimeString();
        const color = type === 'ERROR' ? '#ff4b4b' : (type === 'SUCCESS' ? '#00f2ff' : '#00ff41');
        logBox.innerHTML += `<span style="color:${color}">> ${time} [${type}]: ${msg}</span><br>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // 2. 글로벌 노드 스위칭 시스템
    const countries = ['kr','us','cn','jp','gb','fr','de','in','sa','br','ru','ua','vn','th','id'];
    const flagList = document.getElementById('flag-list');
    countries.forEach(c => {
        const div = document.createElement('div');
        div.className = 'flag-btn';
        div.onclick = () => {
            document.getElementById('node-status').innerText = `[NODE: ${c.toUpperCase()} ACTIVE]`;
            addLog(`${c.toUpperCase()} 게이트웨이로 노드 전환 완료.`);
        };
        div.innerHTML = `<img src="https://flagcdn.com/w160/${c}.png">`;
        flagList.appendChild(div);
    });

    // 3. 실구동 결제 프로세스
    async function launchPayment() {
        payBtn.disabled = true;
        addLog("결제 프로세스 시작 - 유저 인증 확인 중...");

        try {
            // [STEP 1] 유저 인증
            const scopes = ['payments', 'username'];
            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
            addLog(`인증 성공: 회장님 계정(${auth.user.username}) 확인됨.`, 'SUCCESS');

            // [STEP 2] 테스트 결제 생성 (1.00 Pi)
            const paymentData = {
                amount: 1.00,
                memo: "HK Group Strategic Asset Test",
                metadata: { order_id: "TEST-" + Date.now(), type: "HK_WORLD_BANK" }
            };

            const callbacks = {
                // 사용자가 비밀번호를 입력하고 승인했을 때
                onReadyForServerApproval: (paymentId) => {
                    addLog(`결제 ID 생성 완료: ${paymentId}`, 'SUCCESS');
                    addLog("백엔드 서버 승인 대기 중 (시뮬레이션)...");
                    
                    // 실제 환경에서는 여기서 서버 API를 호출해야 합니다.
                    // 테스트를 위해 즉시 승인 신호를 보냅니다.
                    setTimeout(() => {
                        addLog("HK 서버: 트랜잭션 승인 완료.", 'SUCCESS');
                        // 승인 처리 (이 부분은 원래 백엔드에서 수행)
                        Pi.createPayment(paymentId, "approve"); 
                    }, 2000);
                },
                // 블록체인에 기록되고 전송이 완료되었을 때
                onReadyForServerCompletion: (paymentId, txid) => {
                    addLog(`결제 완료! TXID: ${txid}`, 'SUCCESS');
                    addLog("HK-WorldBank 자산 원장에 기록되었습니다.");
                    alert("테스트 결제 성공!\nTXID: " + txid);
                    payBtn.disabled = false;
                },
                onCancel: (paymentId) => {
                    addLog(`결제 취소됨 (ID: ${paymentId})`, 'ERROR');
                    payBtn.disabled = false;
                },
                onError: (error, payment) => {
                    addLog(`오류 발생: ${error.message}`, 'ERROR');
                    payBtn.disabled = false;
                }
            };

            // 결제창 호출
            await Pi.createPayment(paymentData, callbacks);

        } catch (err) {
            addLog("오류: Pi Browser 내부에서 실행 중인지 확인하십시오.", 'ERROR');
            console.error(err);
            payBtn.disabled = false;
        }
    }

    // 미완료 결제 복구 프로세스
    function onIncompletePaymentFound(payment) {
        addLog(`미완료 결제 발견 (ID: ${payment.identifier}) - 복구 시도...`, 'INFO');
    };
</script>

<footer style="text-align:center; padding:100px; color:#1a1a1a; font-size:1.5rem; letter-spacing:20px;">HK GLOBAL HOLDINGS</footer>
</body>
</html>
