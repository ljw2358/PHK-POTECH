<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WorldBank | Global Web3 Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/i18next@21.6.10/i18next.min.js"></script>
    <script src="https://unpkg.com/i18next-browser-languagedetector@6.1.3/i18nextBrowserLanguageDetector.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .gradient-border { border: 1px solid transparent; background-image: linear-gradient(#050505, #050505), linear-gradient(90deg, #ff8a00, #e52e71); background-origin: border-box; background-clip: content-box, border-box; }
        .btn-action { transition: all 0.3s ease; }
        .btn-action:active { transform: scale(0.95); }
        .pi-glow { text-shadow: 0 0 20px rgba(255, 138, 0, 0.5); }
    </style>
</head>
<body class="pb-10">

    <div class="max-w-lg mx-auto px-5">
        <header class="flex justify-between items-center py-6">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-gradient-to-tr from-orange-500 to-pink-600 rounded-lg flex items-center justify-center font-black text-xl italic">HK</div>
                <div>
                    <h1 class="text-xl font-black leading-none uppercase tracking-tighter">HK WorldBank</h1>
                    <span class="text-[10px] text-orange-500 font-bold uppercase tracking-[0.2em]">Global Digital Assets</span>
                </div>
            </div>
            <select id="langSelect" class="bg-white/5 border border-white/10 rounded-full px-3 py-1.5 text-[11px] outline-none">
                <option value="ko">🇰🇷 한국어</option>
                <option value="en">🇺🇸 English</option>
                <option value="zh">🇨🇳 中文</option>
                <option value="ja">🇯🇵 日本語</option>
                <option value="vi">🇻🇳 Tiếng Việt</option>
                <option value="id">🇮🇩 B.Indonesia</option>
                <option value="th">🇹🇭 ภาษาไทย</option>
                <option value="de">🇩🇪 Deutsch</option>
                <option value="fr">🇫🇷 Français</option>
                <option value="es">🇪🇸 Español</option>
                <option value="pt">🇵🇹 Português</option>
                <option value="ru">🇷🇺 Русский</option>
                <option value="ar">🇸🇦 العربية</option>
                <option value="hi">🇮🇳 हिन्दी</option>
                </select>
        </header>

        <section class="mt-4 mb-8">
            <div class="glass p-8 rounded-[30px] text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-orange-500 to-pink-600"></div>
                <p id="txt-balance-label" class="text-xs text-gray-400 uppercase tracking-widest mb-2 font-bold">Real-time Digital Assets</p>
                <h2 class="text-6xl font-black pi-glow mb-2 italic">400 <span class="text-orange-500 not-italic text-3xl">Pi</span></h2>
                <p class="text-green-400 text-sm font-bold">≈ $ 12,566,360.00 (GVC)</p>
            </div>
        </section>

        <section class="grid grid-cols-2 gap-4 mb-8">
            <button class="glass btn-action p-5 rounded-2xl flex flex-col items-center gap-3 hover:bg-white/10">
                <div class="w-12 h-12 bg-orange-500/20 rounded-full flex items-center justify-center text-orange-500 text-xl"><i class="fa-solid fa-credit-card"></i></div>
                <span id="txt-menu-1" class="font-bold text-sm">결제</span>
            </button>
            <button class="glass btn-action p-5 rounded-2xl flex flex-col items-center gap-3 hover:bg-white/10">
                <div class="w-12 h-12 bg-blue-500/20 rounded-full flex items-center justify-center text-blue-400 text-xl"><i class="fa-solid fa-paper-plane"></i></div>
                <span id="txt-menu-2" class="font-bold text-sm">송금</span>
            </button>
            <button class="glass btn-action p-5 rounded-2xl flex flex-col items-center gap-3 hover:bg-white/10">
                <div class="w-12 h-12 bg-purple-500/20 rounded-full flex items-center justify-center text-purple-400 text-xl"><i class="fa-solid fa-vault"></i></div>
                <span id="txt-menu-3" class="font-bold text-sm">예치</span>
            </button>
            <button class="glass btn-action p-5 rounded-2xl flex flex-col items-center gap-3 hover:bg-white/10">
                <div class="w-12 h-12 bg-yellow-500/20 rounded-full flex items-center justify-center text-yellow-400 text-xl"><i class="fa-solid fa-gift"></i></div>
                <span id="txt-menu-4" class="font-bold text-sm">리워드</span>
            </button>
            <button class="glass btn-action p-5 rounded-2xl flex flex-col items-center gap-3 border-2 border-orange-500/30 bg-orange-500/5">
                <div class="w-12 h-12 bg-red-500/20 rounded-full flex items-center justify-center text-red-400 text-xl"><i class="fa-solid fa-hand-holding-dollar"></i></div>
                <span id="txt-menu-5" class="font-bold text-sm text-orange-500">기본소득 (UBI)</span>
            </button>
            <button class="glass btn-action p-5 rounded-2xl flex flex-col items-center gap-3 hover:bg-white/10 text-gray-400">
                <div class="w-12 h-12 bg-gray-500/20 rounded-full flex items-center justify-center text-gray-400 text-xl"><i class="fa-solid fa-headset"></i></div>
                <span id="txt-menu-6" class="font-bold text-sm">고객센터</span>
            </button>
        </section>

        <section class="glass p-6 rounded-3xl mb-8 relative">
            <h3 id="txt-swap-title" class="font-black text-lg mb-4 italic">DEX SWAP</h3>
            <div class="space-y-2">
                <div class="bg-black/60 p-4 rounded-2xl border border-white/5 flex justify-between items-center">
                    <div>
                        <p class="text-[10px] text-gray-500 font-bold uppercase">Send</p>
                        <input type="text" value="100" class="bg-transparent text-2xl font-black outline-none w-24">
                    </div>
                    <div class="flex items-center gap-2 bg-white/5 px-3 py-1 rounded-full border border-white/10">
                        <img src="https://cryptologos.cc/logos/pi-network-pi-logo.png" class="w-5 h-5" alt="Pi">
                        <span class="font-bold text-sm italic">Pi</span>
                    </div>
                </div>
                <div class="flex justify-center -my-4 relative z-10">
                    <div class="w-10 h-10 bg-orange-600 rounded-full border-4 border-[#050505] flex items-center justify-center shadow-lg shadow-orange-600/20">
                        <i class="fa-solid fa-repeat text-white"></i>
                    </div>
                </div>
                <div class="bg-black/60 p-4 rounded-2xl border border-white/5 flex justify-between items-center text-right">
                    <div class="flex items-center gap-2 bg-white/5 px-3 py-1 rounded-full border border-white/10">
                        <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" class="w-5 h-5" alt="USDT">
                        <span class="font-bold text-sm italic text-blue-400">USDT</span>
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-500 font-bold uppercase">Receive (Est.)</p>
                        <p class="text-2xl font-black text-orange-500">31,415.9</p>
                    </div>
                </div>
            </div>
            <button class="w-full bg-gradient-to-r from-orange-600 to-pink-600 py-4 rounded-2xl mt-5 font-black text-lg shadow-xl shadow-orange-600/20 btn-action italic">SWAP NOW</button>
        </section>

        <section class="space-y-3">
            <div class="glass p-4 rounded-2xl flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-chart-line text-green-500"></i>
                    <span id="txt-staking-1" class="text-sm font-bold">Pi-USDT Staking APR</span>
                </div>
                <span class="text-green-400 font-black tracking-tighter">124.5%</span>
            </div>
            <div class="glass p-4 rounded-2xl flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-earth-asia text-orange-500"></i>
                    <span id="txt-staking-2" class="text-sm font-bold">Global UBI Rewards</span>
                </div>
                <span class="text-orange-500 font-black tracking-tighter">8.5%</span>
            </div>
        </section>

        <footer class="mt-10 border-t border-white/5 pt-10 text-center">
            <p class="text-[11px] text-gray-500 font-bold uppercase tracking-widest mb-4 italic">Official Access</p>
            <p class="text-lg font-black text-orange-500 mb-6">info@hkwb.com</p>
            <div class="flex justify-center gap-8 mb-10">
                <a href="#" class="text-gray-400 hover:text-white transition-colors text-2xl"><i class="fa-brands fa-youtube"></i></a>
                <a href="#" class="text-gray-400 hover:text-white transition-colors text-2xl"><i class="fa-brands fa-tiktok"></i></a>
                <a href="#" class="text-gray-400 hover:text-white transition-colors text-2xl"><i class="fa-brands fa-linkedin"></i></a>
            </div>
            <p class="text-[10px] text-gray-700 font-bold uppercase">© 2026 HK GROUP | GLOBAL DIGITAL BANKING PROTOCOL</p>
        </footer>
    </div>

    <script>
        // 30개국 언어 데이터 설정 (확장 가능)
        const resources = {
            ko: { translation: { "bal": "실시간 지갑 총 잔액", "m1": "결제", "m2": "송금", "m3": "예치", "m4": "리워드", "m5": "기본소득 (UBI)", "m6": "고객센터", "swap": "DEX 스왑", "s1": "스테이킹 수익률", "s2": "글로벌 UBI 보상" } },
            en: { translation: { "bal": "Real-time Total Balance", "m1": "Payment", "m2": "Transfer", "m3": "Deposit", "m4": "Rewards", "m5": "Basic Income", "m6": "Support", "swap": "DEX Swap", "s1": "Staking APR", "s2": "Global UBI" } },
            zh: { translation: { "bal": "实时总余额", "m1": "支付", "m2": "转账", "m3": "存款", "m4": "奖励", "m5": "基本收入", "m6": "客服中心", "swap": "DEX 交换", "s1": "质押收益率", "s2": "全球 UBI" } },
            ja: { translation: { "bal": "リアルタイム残高", "m1": "決済", "m2": "送金", "m3": "預金", "m4": "リワード", "m5": "基本所得", "m6": "サポート", "swap": "DEX スワップ", "s1": "ステーキング利回り", "s2": "グローバルUBI" } }
            // ... 나머지 30개국 데이터는 JSON으로 추가 가능
        };

        i18next
            .use(i18nextBrowserLanguageDetector)
            .init({
                fallbackLng: 'en',
                resources: resources
            }, function(err, t) {
                updateUI();
            });

        function updateUI() {
            document.getElementById('txt-balance-label').innerText = i18next.t('bal');
            document.getElementById('txt-menu-1').innerText = i18next.t('m1');
            document.getElementById('txt-menu-2').innerText = i18next.t('m2');
            document.getElementById('txt-menu-3').innerText = i18next.t('m3');
            document.getElementById('txt-menu-4').innerText = i18next.t('m4');
            document.getElementById('txt-menu-5').innerText = i18next.t('m5');
            document.getElementById('txt-menu-6').innerText = i18next.t('m6');
            document.getElementById('txt-swap-title').innerText = i18next.t('swap');
            document.getElementById('txt-staking-1').innerText = i18next.t('s1');
            document.getElementById('txt-staking-2').innerText = i18next.t('s2');
        }

        document.getElementById('langSelect').addEventListener('change', (e) => {
            i18next.changeLanguage(e.target.value, updateUI);
        });
    </script>
</body>
</html>
