<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK | GLOBAL HEGEMONY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #FFD700; --pi-orange: #FF9900; --neon-green: #39FF14;
            --bg: #000; --card: #0d0d0d; --border: #222;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; }
        .hk-container { width: 100%; max-width: 500px; margin: 0 auto; padding: 20px; }

        /* 글로벌 언어 선택기 - 화려한 골드 테두리 */
        .lang-nav { display: flex; justify-content: flex-end; margin-bottom: 30px; }
        .lang-ui { 
            background: #000; border: 2.5px solid var(--gold); border-radius: 10px;
            color: var(--gold); padding: 10px 15px; font-weight: 900; font-size: 14px;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); outline: none;
        }

        /* 로고 및 헤더 */
        .brand-header { text-align: center; margin: 40px 0; }
        .main-title { font-size: 48px; font-weight: 950; color: var(--gold); line-height: 1.1; letter-spacing: -2px; }
        .node-id { color: var(--neon-green); font-size: 12px; font-weight: 800; margin-top: 15px; letter-spacing: 1.5px; }

        /* 자산 메인 카드 */
        .asset-box { 
            background: linear-gradient(145deg, #1a1a1a, #050505);
            border: 1px solid var(--border); border-radius: 35px;
            padding: 45px 25px; margin-bottom: 35px; position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
        }
        .apr-badge { position: absolute; top: 25px; right: 30px; color: var(--neon-green); font-weight: 900; }
        .asset-lab { color: var(--gold); font-size: 18px; font-weight: 700; margin-bottom: 25px; }
        .price-row { display: flex; align-items: center; justify-content: center; margin-bottom: 30px; }
        .val { font-size: 56px; font-weight: 900; }
        .symbol { font-size: 28px; color: var(--pi-orange); margin-left: 10px; font-weight: 800; }
        .gcv-val { 
            border: 2px solid var(--neon-green); border-radius: 50px;
            padding: 16px 28px; color: var(--neon-green); font-size: 20px;
            font-weight: 900; background: rgba(57, 255, 20, 0.05); display: inline-block;
        }

        /* '칼라' 메뉴 - 6구 입체 디자인 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 40px 0; }
        .menu-unit { 
            background: #0a0a0a; border-radius: 25px; padding: 25px 10px;
            border: 1px solid #1a1a1a; text-decoration: none; transition: 0.2s;
        }
        .menu-unit:active { transform: scale(0.95); background: #151515; }
        .icon-wrap { 
            width: 70px; height: 70px; background: #111; border-radius: 22px;
            margin: 0 auto 12px; display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 10px #000, 0 5px 15px rgba(0,0,0,0.5);
        }
        .icon-wrap i { font-size: 32px; }
        .menu-txt { font-size: 14px; font-weight: 800; color: #ddd; }

        /* 하단 스테이킹 & 보안 */
        .status-panel { 
            text-align: left; padding: 25px; margin-bottom: 40px;
            border-left: 6px solid var(--gold); background: #080808; border-radius: 0 20px 20px 0;
        }
        .stk-lab { color: var(--pi-orange); font-size: 15px; font-weight: 900; margin-bottom: 10px; }
        .liq-val { font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 10px; }
        .shield-lab { color: #00BFFF; font-size: 14px; font-weight: 800; }

        /* 유튜브/틱톡 공식 링크 */
        .cs-cta { 
            width: 100%; padding: 22px; background: var(--pi-orange); border-radius: 20px;
            color: #fff; font-size: 19px; font-weight: 900; border: none; margin-bottom: 30px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(255, 153, 0, 0.3);
        }
        .sns-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 50px; }
        .sns-btn { 
            background: #111; padding: 25px; border-radius: 25px; border: 1px solid #222;
            text-decoration: none; color: #fff; display: flex; flex-direction: column; align-items: center;
        }
        .sns-btn i { font-size: 38px; margin-bottom: 12px; }

        .hk-footer { font-size: 12px; color: #444; line-height: 1.8; font-weight: 800; margin-top: 50px; padding-bottom: 60px; }
    </style>
</head>
