<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK WORLD BANK | GLOBAL MASTER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --pi: #FF8C00; --neon: #00FF7F; --red: #FF4500; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .app { width: 100%; max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 50px; }
        
        /* 상단 언어 선택 */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px; }
        .node { color: var(--neon); font-size: 11px; font-weight: 900; }
        .lang-trigger { border: 2px solid var(--gold); color: var(--gold); padding: 7px 15px; border-radius: 12px; font-size: 14px; font-weight: 950; cursor: pointer; }

        /* 헤더 */
        .header { text-align: center; padding: 15px 0 35px; }
        .logo { font-size: 42px; font-weight: 950; color: var(--gold); margin: 0; }

        /* 자산 카드 */
        .asset-box { background: linear-gradient(145deg, #151515, #000); border: 1.5px solid #222; border-radius: 35px; margin: 0 20px; padding: 45px 20px; text-align: center; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .apr { position: absolute; top: 20px; right: 25px; color: var(--neon); font-weight: 950; font-size: 16px; }
        .bal { font-size: 55px; font-weight: 950; margin: 25px 0; }
        .gcv { display: inline-block; border: 3px solid var(--neon); border-radius: 25px; padding: 15px 35px; color: var(--neon); font-weight: 950; font-size: 20px; line-height: 1.4; }

        /* 6대 아이콘 그리드 */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 40px 25px; }
        .grid-item { text-align: center; }
        .icon-circle { width: 80px; height: 80px; background: rgba(255,255,255,0.08); border-radius: 26px; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; }
        .grid-item span { font-weight: 800; font-size: 16px; display: block; }

        /* 하단 데이터 및 버튼 */
        .liquidity { border-left: 6px solid var(--gold); margin: 0 25px 35px; padding-left: 20px; }
        .btn-wrap { display: flex; gap: 12px; padding: 0 20px; margin-bottom: 40px; }
        .btn-c { flex: 1; height: 75px; border-radius: 20px; border: none; font-size: 18px; font-weight: 950; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .b-1 { background: #000; border: 3px solid var(--gold); color: #fff; }
        .b-2 { background: var(--pi); color: #fff; }
        .b-3 { background: var(--neon); color: #000; }

        /* 고객센터 및 SNS */
        .cs-bar { width: calc(100% - 40px); height: 85px; background: var(--red); color: #fff; border-radius: 25px; border: none; margin: 0 20px 30px; font-size: 22px; font-weight: 950; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .sns-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .sns-card { background: #0d0d0d; border-radius: 25px; padding: 25px; border: 2px solid #1a1a1a; text-align: center; text-decoration: none; color: #fff; }

        /* 언어 선택 모달 */
        #langPop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .pop-in { background: #fff; color: #000; width: 92%; max-height: 85vh; border-radius: 40px; padding: 35px; overflow-y: auto; }
        .pop-row { display: flex; align-items: center; gap: 20px; padding: 22px 0; border-bottom: 2px solid #f2f2f2; font-weight: 950; font-size: 21px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app">
    <nav class="top-bar">
        <div class="node">🛰️ SECURE NODE: HK-V190-SUPREME</div>
        <div class="lang-trigger" id="langDisp" onclick="toggleL()">KR (한국어) ⌵</div>
    </nav>

    <header class="header"><h1 class="logo" id="l-bank">HK WORLD BANK</h1></header>

    <section class="asset-box">
        <div class="apr">APR 31.4%</div>
        <div style="color:var(--gold); font-weight:900;" id="l-asset">메인 자산 통합 원장</div>
        <div class="bal">400.0000 <span style="color:var(--pi); font-size:26px;">Pi</span></div>
        <div class="gcv" id="l-gcv">가치 평가: $ 125,663,600<br>(GCV CONSENSUS)</div>
    </section>

    <section class="grid" id="menuGrid"></section>

    <section class="liquidity">
        <div style="color:var(--pi); font-weight:950;" id="l-st1">STAKING APR 31.4%</div>
        <div style="color:var(--gold); font-weight:950; margin:5px 0;" id="l-st2">유동성 풀 $</div>
        <div style="font-size:30px; font-weight:950;">88,401,773,756</div>
        <div style="color:#00ccff; font-weight:950; margin-top:8px;" id="l-st3">HK_퀀텀_쉴드_보안_활성</div>
    </section>

    <div class="btn-wrap">
        <button class="btn-c b-1" id="l-b1">Pi 수량</button>
        <button class="btn-c b-2" id="l-b2">SWAP</button>
        <button class="btn-c b-3" id="l-b3">LP 공급</button>
    </div>

    <button class="cs-bar" id="l-cs"><i class="fa-solid fa-headset"></i> 24/7 고객지원센터</button>

    <div class="sns-grid">
        <a href="#" class="sns-card"><i class="fa-brands fa-youtube" style="color:#f00; font-size:40px;"></i><div style="font-weight:950; margin-top:12px;">hyekong2025</div><small style="color:#666;">YouTube</small></a>
        <a href="#" class="sns-card"><i class="fa-brands fa-tiktok" style="font-size:40px;"></i><div style="font-weight:950; margin-top:12px;">hyekong2025</div><small style="color:#666;">TikTok</small></a>
    </div>

    <footer style="text-align:center; padding:60px 0; color:#444; font-size:13px; font-weight:900;">© 2026 HK GROUP GLOBAL HEGEMONY.</footer>
</div>

<div id="langPop"><div class="pop-in" id="langList"></div></div>

<script>
    /* 마스터 언어 딕셔너리 */
    const DATA = {
        ko: { n:"KR (한국어)", bank:"HK WORLD BANK", asset:"메인 자산 통합 원장", gcv:"가치 평가: $ 125,663,600", menu:["송금","결제","예치","보상","소득","스왑"], btns:["Pi 수량","SWAP","LP 공급"], cs:"24/7 글로벌 고객지원센터", st:["STAKING APR 31.4%","유동성 풀 $","HK_퀀텀_쉴드_보안_활성"] },
        ua: { n:"UA (Українська)", bank:"HK СВІТОВИЙ БАНК", asset:"ГОЛОВНИЙ РЕЄСТР АКТИВІВ", gcv:"ОЦІНКА: $ 125,663,600", menu:["ПЕРЕКАЗ","ОПЛАТА","ДЕПОЗИТ","НАГОРОДА","ДОХІД","ОБМІН"], btns:["К-сть Pi","SWAP","LP ПОСТАВКА"], cs:"ЦІЛОДОБОВА ПІДТРИМКА", st:["СТЕЙКІНГ 31.4%","ПУЛ ЛІКВІДНОСТІ $","HK_КВАНТОВИЙ_ЩИТ"] },
        ar: { n:"AR (العربية)", bank:"HK مصرف العالم", asset:"دفتر الأصول الرئيسي", gcv:"التقييم: $ 125,663,600", menu:["إرسال","دفع","تخزين","مكافأة","دخل","تبادل"], btns:["كمية Pi","SWAP","تزويد LP"], cs:"دعم عالمي 24/7", st:["تخزين 31.4%","مجمع السيولة $","HK_درع الكم"] },
        in: { n:"IN (हिन्दी)", bank:"HK वर्ल्ड बैंक", asset:"मुख्य संपत्ति लेजर", gcv:"मूल्यांकन: $ 125,663,600", menu:["भेजें","भुगतान","जमा","इनाम","आय","स्वैप"], btns:["Pi मात्रा","SWAP","LP आपूर्ति"], cs:"24/7 वैश्विक सहायता", st:["स्टेकिंग 31.4%","लिक्विडिटी पूल $","HK_क्वांटम_शील्ड"] },
        vn: { n:"VN (Tiếng Việt)", bank:"HK NGÂN HÀNG THẾ GIỚI", asset:"SỔ CÁI TÀI SẢN CHÍNH", gcv:"ĐỊNH GIÁ: $ 125,663,600", menu:["GỬI","THANH TOÁN","GỬI TIẾT KIỆM","THƯỞNG","THU NHẬP","SWAP"], btns:["Số lượng Pi","SWAP","Cung cấp LP"], cs:"HỖ TRỢ TOÀN CẦU 24/7", st:["LÃI SUẤT 31.4%","BỂ THANH KHOẢN $","HK_GIÁP_LƯỢNG_TỬ"] },
        us: { n:"US (English)", bank:"HK WORLD BANK", asset:"MAIN ASSET LEDGER", gcv:"VALUATION: $ 125,663,600", menu:["SEND","PAY","STAKE","REWARD","INCOME","SWAP"], btns:["Pi Qty","SWAP","LP Supply"], cs:"24/7 GLOBAL SUPPORT", st:["STAKING 31.4%","LIQUIDITY POOL $","HK_QUANTUM_SHIELD"] }
    };
    ["es","pt","de","fr","it","ru","id","th","jp","cn","tr","ph","my","pl"].forEach(c => { DATA[c] = DATA.us; DATA[c].n = c.toUpperCase() + " (Global)"; });

    const ICONS = [{i:"fa-paper-plane",c:"#4da6ff"},{i:"fa-shopping-bag",c:"#ff66cc"},{i:"fa-utensils",c:"#fff"},{i:"fa-gift",c:"var(--gold)"},{i:"fa-balance-scale",c:"#b3ff66"},{i:"fa-sync",c:"#9966ff"}];

    function toggleL() { const m = document.getElementById('langPop'); m.style.display = m.style.display==='flex'?'none':'flex'; }

    /* [진짜 변환 로직] 클릭하면 화면이 즉시 바뀜 */
    window.changeLang = function(key) {
        const d = DATA[key];
        document.getElementById('langDisp').innerText = d.n + " ⌵";
        document.getElementById('l-bank').innerText = d.bank;
        document.getElementById('l-asset').innerText = d.asset;
        document.getElementById('l-gcv').innerHTML = d.gcv + "<br>(GCV CONSENSUS)";
        document.getElementById('l-b1').innerText = d.btns[0];
        document.getElementById('l-b2').innerText = d.btns[1];
        document.getElementById('l-b3').innerText = d.btns[2];
        document.getElementById('l-cs').innerHTML = `<i class="fa-solid fa-headset"></i> ` + d.cs;
        document.getElementById('l-st1').innerText = d.st[0];
        document.getElementById('l-st2').innerText = d.st[1];
        document.getElementById('l-st3').innerText = d.st[2];

        const grid = document.getElementById('menuGrid'); grid.innerHTML = '';
        d.menu.forEach((v, i) => {
            grid.innerHTML += `<div class="grid-item"><div class="icon-circle"><i class="fa-solid ${ICONS[i].i}" style="color:${ICONS[i].c}"></i></div><span>${v}</span></div>`;
        });
        toggleL();
    };

    const list = document.getElementById('langList');
    Object.keys(DATA).forEach(k => {
        list.innerHTML += `<div class="pop-row" onclick="changeLang('${k}')"><span>${DATA[k].n}</span></div>`;
    });

    window.onload = () => changeLang('ko');
</script>
</body>
</html>
