<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK WorldBank Global</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>Pi.init({ version: "2.0", sandbox: false });</script>

    <style>
        :root { --hk-yellow: #f1c40f; --hk-green: #00ff00; --hk-bg: #000; --hk-card-bg: #0a0a0a; --hk-red: #e74c3c; }
        body { background: var(--hk-bg); color: #fff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .hk-logo { font-size: 22px; font-weight: 800; color: var(--hk-yellow); }
        /* 언어 버튼 스타일 */
        .lang-btn { color: #f39c12; border: 1px solid #f39c12; background: none; padding: 5px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; }
        
        .asset-card { background: var(--hk-card-bg); border-radius: 25px; padding: 30px 20px; position: relative; margin-bottom: 30px; border: 1px solid #1a1a1a; }
        .apr-tag { color: var(--hk-green); font-size: 15px; font-weight: bold; position: absolute; top: 25px; right: 25px; }
        .pi-input-box { background: transparent; border: none; border-bottom: 3px solid var(--hk-yellow); color: #fff; font-size: 45px; font-weight: 900; width: 60%; text-align: center; outline: none; }
        .gcv-eval { font-size: 18px; color: var(--hk-green); border: 2px solid var(--hk-green); border-radius: 30px; padding: 15px; display: block; width: 90%; margin: 25px auto 0; font-weight: bold; text-decoration: none; background: transparent; cursor: pointer; }

        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 40px; }
        .menu-item { background: var(--hk-card-bg); border-radius: 18px; padding: 20px 5px; border: 1px solid #1a1a1a; }
        .m-txt { font-size: 13px; font-weight: bold; display: block; margin-top: 10px; }

        .staking-info { border-left: 4px solid var(--hk-yellow); text-align: left; padding-left: 15px; margin-bottom: 30px; }
        .liquidity-amount { font-size: 35px; font-weight: 900; color: #fff; margin-top: 5px; }

        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .social-card { background: var(--hk-card-bg); border-radius: 20px; padding: 20px; border: 1px solid #1a1a1a; text-decoration: none; color: #fff; }
    </style>
</head>
<body>

<div class="header">
    <div class="hk-logo">HK WORLD BANK</div>
    <button id="langBtn" class="lang-btn" onclick="toggleLanguage()">KR (한국어)</button>
</div>
<div id="nodeTxt" class="node-info" style="color:var(--hk-green); text-align:left; font-size:12px; margin-bottom:20px;">🚀 SECURE NODE: HK-V190-SUPREME</div>

<div class="asset-card">
    <div class="apr-tag">APR 31.4%</div>
    <div id="cardTitle" style="color:var(--hk-yellow); font-weight:bold; text-align:left; margin-bottom:20px;">메인 자산 통합 원장</div>
    <div>
        <input type="number" id="user_pi_amount" class="pi-input-box" value="400.0000">
        <span style="color:#f39c12; font-size:25px; font-weight:900;">Pi</span>
    </div>
    <button id="gcvBtn" class="gcv-eval" onclick="execute_flexible_staking()">가치 평가: $ 125,663,600 (GCV)</button>
</div>

<div class="menu-grid">
    <div class="menu-item"><span>🚀</span><span id="m1" class="m-txt">송금</span></div>
    <div class="menu-item"><span>🛒</span><span id="m2" class="m-txt">결제</span></div>
    <div class="menu-item"><span>💿</span><span id="m3" class="m-txt">예치</span></div>
    <div class="menu-item"><span>🎁</span><span id="m4" class="m-txt">보상</span></div>
    <div class="menu-item"><span>⚖️</span><span id="m5" class="m-txt">소득</span></div>
    <div class="menu-item"><span>🔄</span><span id="m6" class="m-txt">스왑</span></div>
</div>

<div class="staking-info">
    <span id="stkTitle" style="color:var(--hk-yellow); font-weight:bold;">STAKING APR 31.4%</span><br>
    <span id="lpTitle" style="color:#f39c12; font-size:13px;">유동성 풀 $</span>
    <div class="liquidity-amount">88,401,773,756</div>
    <div id="shieldTxt" style="color:#00ccff; font-size:12px; font-weight:bold;">HK_퀀텀_쉴드_활성</div>
</div>

<div class="social-grid">
    <a href="#" class="social-card"><strong>hyekong2025</strong><br><small>YouTube</small></a>
    <a href="#" class="social-card"><strong>hyekong2025</strong><br><small>TikTok</small></a>
</div>

<script>
    let currentLang = 'ko';
    function toggleLanguage() {
        if (currentLang === 'ko') {
            // 영어로 변경
            document.getElementById('langBtn').innerText = 'EN (English)';
            document.getElementById('cardTitle').innerText = 'Universal Asset Ledger';
            document.getElementById('gcvBtn').innerText = 'Value Eval: $ 125,663,600 (GCV)';
            document.getElementById('m1').innerText = 'Send';
            document.getElementById('m2').innerText = 'Pay';
            document.getElementById('m3').innerText = 'Stake';
            document.getElementById('m4').innerText = 'Reward';
            document.getElementById('m5').innerText = 'Income';
            document.getElementById('m6').innerText = 'Swap';
            document.getElementById('lpTitle').innerText = 'Liquidity Pool $';
            document.getElementById('shieldTxt').innerText = 'HK_QUANTUM_SHIELD_ACTIVE';
            currentLang = 'en';
        } else {
            // 한국어로 변경
            document.getElementById('langBtn').innerText = 'KR (한국어)';
            document.getElementById('cardTitle').innerText = '메인 자산 통합 원장';
            document.getElementById('gcvBtn').innerText = '가치 평가: $ 125,663,600 (GCV)';
            document.getElementById('m1').innerText = '송금';
            document.getElementById('m2').innerText = '결제';
            document.getElementById('m3').innerText = '예치';
            document.getElementById('m4').innerText = '보상';
            document.getElementById('m5').innerText = '소득';
            document.getElementById('m6').innerText = '스왑';
            document.getElementById('lpTitle').innerText = '유동성 풀 $';
            document.getElementById('shieldTxt').innerText = 'HK_퀀텀_쉴드_활성';
            currentLang = 'ko';
        }
    }
</script>
</body>
